name: seeded tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # the seeded suite is stdlib-only — no pip install needed
      - run: python test_spine.py
        working-directory: weekend-window/app
